<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <div class="profile-container">
    <h2>👤 Complete Your Profile</h2>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="number" id="age" placeholder="Age" required>
    <select id="gender">
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
    <input type="text" id="bloodGroup" placeholder="Blood Group (e.g., A+)" required>

    <button id="saveProfileBtn">💾 Save Profile</button>
    <p id="message"></p>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const msg = document.getElementById("message");
    const saveProfileBtn = document.getElementById("saveProfileBtn");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      // ✅ If profile already exists, redirect directly to home
      if (userSnap.exists()) {
        const data = userSnap.data();
        if (data.name && data.age && data.gender && data.bloodGroup) {
          window.location.href = "home.html";
          return;
        }
      }

      // Otherwise, stay on this page to fill details
      saveProfileBtn.addEventListener("click", async () => {
        const name = document.getElementById("name").value.trim();
        const age = document.getElementById("age").value.trim();
        const gender = document.getElementById("gender").value;
        const bloodGroup = document.getElementById("bloodGroup").value.trim();

        if (!name || !age || !gender || !bloodGroup) {
          msg.textContent = "⚠️ Please fill all fields.";
          return;
        }

        try {
          await setDoc(userRef, {
            name,
            age,
            gender,
            bloodGroup,
            email: user.email,
            createdAt: new Date()
          });

          msg.textContent = "✅ Profile saved successfully!";
          setTimeout(() => (window.location.href = "home.html"), 1500);
        } catch (error) {
          msg.textContent = "⚠️ " + error.message;
        }
      });
    });
  </script>
</body>
</html>
